name: player-prop-platform

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    ports:
      - 6379:6379

  api:
    build:
      context: ./services/api
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      ODDS_API_KEY: ${ODDS_API_KEY}
      ODDS_API_BASE_URL: ${ODDS_API_BASE_URL}
      ODDS_API_SPORT: ${ODDS_API_SPORT}
      ODDS_API_REGIONS: ${ODDS_API_REGIONS}
      ODDS_API_ODDS_FORMAT: ${ODDS_API_ODDS_FORMAT}
      ODDS_API_BOOKMAKERS: ${ODDS_API_BOOKMAKERS}
    ports:
      - 8000:8000
    volumes:
      - ./services/training/artifacts:/artifacts:ro
    depends_on:
      - postgres
      - redis

  inference:
    build:
      context: ./services/inference
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
    ports:
      - 8001:8001
    depends_on:
      - postgres
      - redis

  training:
    build:
      context: ./services/training
    environment:
      ARTIFACT_DIR: /artifacts
      LOOKBACK: "5"
      POSTGRES_DB: app
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: app
      POSTGRES_PORT: "5432"
      POSTGRES_USER: app
    volumes:
      - ./services/training/artifacts:/artifacts
    depends_on:
      - postgres

volumes:
  postgres_data:
